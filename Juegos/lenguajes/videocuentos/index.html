<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Mágica - Videocuentos</title>
    <style>
        :root {
            --color-fondo: #fcf4b6; 
            --color-texto: #333333;
            --color-borde-tarjeta: #f39c12; 
            --color-boton-morado: #512b8a; 
            --color-boton-morado-hover: #3e2069;
            --fuente-principal: 'Comic Sans MS', 'Fredoka One', 'Varela Round', sans-serif;
        }

        body {
            font-family: var(--fuente-principal);
            background-color: var(--color-fondo);
            color: var(--color-texto);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #ff6b6b;
            font-size: 3rem;
            text-align: center;
            text-shadow: 2px 2px 0px #fff;
            margin-bottom: 40px;
        }

        /* --- MENÚ DE SELECCIÓN --- */
        #vista-seleccion {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contenedor-cuentos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            width: 100%;
            margin-bottom: 50px;
        }

        .tarjeta-cuento {
            background-color: #fff9e6;
            border: 4px dashed var(--color-borde-tarjeta);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .tarjeta-cuento:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }

        /* El recuadro gris que verás si no hay imagen */
        .tarjeta-cuento img {
            width: 100%;
            border-radius: 15px;
            height: 180px;
            object-fit: cover;
            margin-bottom: 15px;
            background-color: #ddd; 
        }

        .tarjeta-cuento h2 {
            font-size: 1.5rem;
            color: var(--color-boton-morado);
            margin: 0;
            text-decoration: underline;
        }

        .btn-morado {
            background-color: var(--color-boton-morado);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: inherit;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 0 #2a1050;
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-morado:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #2a1050;
        }

        /* --- REPRODUCTOR DE VIDEO --- */
        #vista-reproductor {
            display: none; 
            width: 100%;
            max-width: 900px;
            flex-direction: column;
            align-items: center;
            animation: aparecer 0.5s ease-in-out;
        }

        .recuadro-video {
            background-color: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            box-sizing: border-box;
            border: 4px solid var(--color-boton-morado);
            margin-bottom: 30px;
        }

        .titulo-video-actual {
            color: var(--color-boton-morado);
            font-size: 2rem;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            border-radius: 10px;
            background-color: #000;
            outline: none;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="vista-seleccion">
        <h1>Selecciona un Videocuento</h1>
        
        <div class="contenedor-cuentos">
            
            <div class="tarjeta-cuento" onclick="abrirCuento('El León y el Ratón', 'videos/leon.mp4')">
                <img src="img/leon.jpg" alt="Portada">
                <h2>El León y el Ratón</h2>
            </div>

            <div class="tarjeta-cuento" onclick="abrirCuento('La Lechera', 'videos/lechera.mp4')">
                <img src="img/lechera.jpg" alt="Portada">
                <h2>La Lechera</h2>
            </div>

            <div class="tarjeta-cuento" onclick="abrirCuento('La Liebre y la Tortuga', 'videos/liebre.mp4')">
                <img src="img/liebre.jpg" alt="Portada">
                <h2>La Liebre y la Tortuga</h2>
            </div>

            <div class="tarjeta-cuento" onclick="abrirCuento('El Congreso de los Ratones', 'videos/ratones.mp4')">
                <img src="img/ratones.jpg" alt="Portada">
                <h2>El Congreso de los Ratones</h2>
            </div>

            </div>

        <a href="../lenguajes.html" class="btn-morado">
            ⬅️ Regresar a Menú Principal
        </a>
    </div>

    <div id="vista-reproductor">
        
        <div class="recuadro-video">
            <h2 class="titulo-video-actual" id="titulo-reproductor">Título del Cuento</h2>
            <video id="video-player" controls controlsList="nodownload">
                <source src="" type="video/mp4" id="video-source">
                Tu navegador no soporta la reproducción de videos.
            </video>
        </div>

        <button class="btn-morado" onclick="cerrarCuento()">
            ⬅️ Regresar a Videocuentos
        </button>

    </div>

    <script>
        const vistaSeleccion = document.getElementById('vista-seleccion');
        const vistaReproductor = document.getElementById('vista-reproductor');
        const videoPlayer = document.getElementById('video-player');
        const tituloReproductor = document.getElementById('titulo-reproductor');

        function abrirCuento(titulo, rutaVideo) {
            tituloReproductor.innerText = titulo;
            videoPlayer.src = rutaVideo;

            vistaSeleccion.style.display = 'none';
            vistaReproductor.style.display = 'flex';

            videoPlayer.play();
        }

        function cerrarCuento() {
            videoPlayer.pause();
            videoPlayer.src = "";

            vistaReproductor.style.display = 'none';
            vistaSeleccion.style.display = 'flex';
        }
    </script>
</body>
</html>
