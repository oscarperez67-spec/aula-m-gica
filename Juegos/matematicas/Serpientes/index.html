<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serpientes y Escaleras - Aula Mágica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu-screen" class="screen">
        <div style="width: 100%; max-width: 450px; text-align: left; margin-bottom: 20px;">
            <button class="btn-small" onclick="window.location.href='../matematicas.html'">⬅ Menú</button>
        </div>
        <h1>🐍 Serpientes y Escaleras 🪜</h1>
        <div class="menu-card">
            <label>Grado Escolar:</label>
            <select id="difficulty">
                <option value="1">1º de Primaria</option>
                <option value="2">2º de Primaria</option>
                <option value="3">3º de Primaria</option>
                <option value="4">4º de Primaria</option>
                <option value="5">5º de Primaria</option>
                <option value="6">6º de Primaria</option>
            </select>

            <label>Jugadores:</label>
            <select id="player-count">
                <option value="1">1 Jugador</option>
                <option value="2">2 Jugadores</option>
                <option value="3">3 Jugadores</option>
                <option value="4">4 Jugadores</option>
            </select>

            <button class="btn-primary" onclick="initGame()">¡A Jugar!</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="display: none;">
        <div id="game-header">
            <button class="btn-small" onclick="location.reload()">⬅ Reiniciar</button>
            <div id="turn-display">
                Turno: <span id="turn-token-icon"></span> <span id="current-color-name"></span>
            </div>
        </div>

        <div id="board-container">
            <div id="board"></div>
        </div>

        <div id="game-footer">
            <div id="dice-section">
                <div id="dice">🎲</div>
                <button id="roll-btn" class="btn-primary" onclick="processMove()">Tirar Dado</button>
            </div>
        </div>
    </div>

    <dialog id="math-modal">
        <div class="modal-content">
            <h2 id="modal-title">📝 ¡Resuelve!</h2>
            <div id="op-question" class="math-expression"></div>
            <input type="number" id="op-answer" pattern="\d*" inputmode="numeric" placeholder="?">
            <br>
            <button class="btn-primary mt-10" onclick="checkAnswer()">Comprobar</button>
        </div>
    </dialog>

    <dialog id="feedback-modal">
        <div class="modal-content">
            <h2 id="feedback-title"></h2>
            <p id="feedback-text"></p>
            <button id="feedback-btn" class="btn-primary" onclick="closeFeedback()">¡Entendido!</button>
        </div>
    </dialog>

    <div id="confetti-container"></div>
    <script src="script.js"></script>
</body>
</html>
